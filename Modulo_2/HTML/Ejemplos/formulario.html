<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario de registro</h1>
     <form action="/index.html" method="post">
        <fieldset>
            <fieldset>
               <legend>Datos personales</legend>

            <label for="name">Nombre:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Correo electronico:</label><br>
            <input type="text" id="email" name="email"><br><br>

            <label for="edad">Edad:</label><br>
            <input type="text" id="edad" name="edad"><br><br>
            </fieldset>

            <fieldset>
                <legend>Opciones múltiples-checkbox</legend>
            <label for="options">Cuanto es 2 + 2?</label><br>


            <input type="checkbox" id="option1" name="options" value="options">
            <label for="option1">4</label><br>

            <input type="checkbox" id="option2" name="options" value="options">
            <label for="option2">6</label><br>
            </fieldset>

            <fieldset>
                <legend>Opciones únicas-radio</legend>
            <label for="options">Genero:</label><br>
            <input type="radio" id="option1" name="options" value="options">
            <label for="option1">Masculino</label><br>
            <input type="radio" id="option2" name="options" value="options">
            <label for="option2">Femenino</label><br>

            </fieldset>





            





        







</body>
</html>
